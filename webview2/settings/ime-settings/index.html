<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(IME)Settings</title>
  <link rel="icon" href="./assets/MetasequoiaIME.png">
</head>

<body>
  <header class="titlebar">
    <div class="titlebar-left">
      <span class="window-title">Settings</span>
    </div>
    <div class="titlebar-right window-controls" aria-label="Window controls">
      <button id="btn-minimize" class="window-button minimize" aria-label="Minimize window" data-tooltip="Minimize">
        <img class="window-icon" src="/assets/minimize.svg" alt="" />
      </button>
      <button id="btn-maximize" class="window-button maximize" aria-label="Maximize window" data-tooltip="Maximize">
        <img class="window-icon" src="/assets/maximize.svg" alt="" />
      </button>
      <button id="btn-restore" class="window-button restore is-hidden" aria-label="Restore window"
        data-tooltip="Restore">
        <img class="window-icon" src="/assets/restore.svg" alt="" />
      </button>
      <button id="btn-close" class="window-button close" aria-label="Close window" data-tooltip="Close">
        <img class="window-icon" src="/assets/close.svg" alt="" />
      </button>
    </div>
  </header>
  <div class="main">
    <!-- 侧边栏容器 -->
    <div id="sidebar-container"></div>

    <!-- 内容区域容器 -->
    <div id="content-container" class="content">
      <div id="general"></div>
      <div id="appearance"></div>
      <div id="input"></div>
      <div id="helpcode"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
