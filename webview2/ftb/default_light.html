<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>IME(FTB)</title>
  <style>
    body {
      background-color: transparent;
      margin: 0;
      height: 100vh;
      -webkit-app-region: drag;
    }

    /* 状态栏整体样式 */
    .status-bar {
      position: absolute;
      height: 35px;
      top: 0px;
      left: 0px;
      display: flex;
      align-items: center;
      background-color: #ffffff;
      border-radius: 8px;
      padding: 0px 10px;
      padding-left: 8px;
      padding-right: 4px;
      gap: 6px;

      border: 1.4px solid rgba(0, 0, 0, 0.12);
      box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(8px);
    }

    /* 拖动条 */
    .drag-handle {
      color: ;
      width: 2.5px;
      height: 14px;
      border-radius: 2px;
      background: #8E8CD8;
      margin-right: 0px;
      position: relative;
    }

    /* 分隔线 */
    .divider {
      width: 1.2px;
      align-self: stretch;
      background-color: rgba(0, 0, 0, 0.12);
      margin-left: 4px;
      margin-right: 0px;
    }

    .icon {
      color: #1a1a1a;
      font-size: 20px;
      font-family: "Segoe UI Symbol", "Microsoft YaHei", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      transition: background-color 0.15s ease;
      cursor: default;
    }

    .icon:hover {
      background-color: rgba(0, 0, 0, 0.06);
    }

    .left-section {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .right-section {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>

<script>
  // 
  // 左侧拖拽区域
  //
  let dividerX = 0;

  // 初始化时或窗口尺寸变化时更新一次
  function updateDividerX() {
    const divider = document.querySelector('.divider');
    if (divider) {
      dividerX = divider.getBoundingClientRect().left;
    }
  }

  let isDragging = false, startX, startY;

  window.addEventListener('mousedown', e => {
    if (e.clientX < dividerX) { // 左部区域
      isDragging = true;
      window.chrome.webview.postMessage(JSON.stringify({ type: 'dragStart' }));
    }
  });

  window.addEventListener('mouseup', () => {
    isDragging = false;
  });

  window.addEventListener('resize', updateDividerX);
  window.addEventListener('load', updateDividerX);

  //
  // 中英切换
  //
  // Default status is CN
  document.getElementById('en').style.display = 'none';
  // document.getElementById('cn').style.display = 'none';
  // 中英切换点击，向 Cpp 端发送消息
  document.getElementById('cn').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changeIMEMode', data: 'en' }));
  });
  document.getElementById('en').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changeIMEMode', data: 'cn' }));
  });

  //
  // 半角全角切换
  //
  // Default status is Halfwidth
  document.getElementById('fullwidth').style.display = 'none';
  // document.getElementById('halfwidth').style.display = 'none';
  document.getElementById('halfwidth').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changeCharMode', data: 'fullwidth' }));
  });
  document.getElementById('fullwidth').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changeCharMode', data: 'halfwidth' }));
  });

  //
  // 中英文标点切换
  //
  // Default status is CN Punc
  document.getElementById('puncEn').style.display = 'none';
  // document.getElementById('puncCn').style.display = 'none';
  document.getElementById('puncCn').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changePuncMode', data: 'puncEn' }));
  });
  document.getElementById('puncEn').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changePuncMode', data: 'puncCn' }));
  });

  //
  // 简繁输入切换
  //
  document.getElementById('character-set').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'changeCharacterSet' }));
  });

  //
  // 设置按钮
  //
  document.getElementById('settings').addEventListener('click', () => {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'openSettings' }));
  });

</script>
