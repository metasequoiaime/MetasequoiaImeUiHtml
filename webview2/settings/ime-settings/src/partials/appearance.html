<div class="content" id="appearence-settings">
  <div class="content-header"><span>外观</span></div>

  <!-- 候选窗口预览 -->
  <div class="section sec-candidate-preview">
    <div class="section-header s-h-cand-preview">
      <div class="section-title">候选窗口预览</div>
    </div>
    <div class="cand-preview">
      <div class="candidate wnd-v" id="candidate-wnd-v"></div>
      <div class="candidate wnd-h" id="candidate-wnd-h"></div>
    </div>
  </div>

  <!-- 主题模式 -->
  <div class="section sec-theme">
    <div class="section-header theme-toggle-header">
      <div class="section-title">主题模式</div>
      <div class="dropdown">
        <button class="dropdown-toggle" id="themeBtn">
          <span>跟随系统</span>
          <div class="arrow">
            <img src="./assets/arrow.svg" alt="arrow">
          </div>
        </button>
        <div class="dropdown-menu" id="themeMenu">
          <div class="dropdown-item" data-value="dark">深色</div>
          <div class="dropdown-item" data-value="light">浅色</div>
          <div class="dropdown-item" data-value="auto">跟随系统</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 候选项排列方式 -->
  <div class="section sec-arrange">
    <div class="section-header">
      <div class="section-title">候选项排列方式</div>
      <div class="dropdown">
        <button class="dropdown-toggle" id="arrangeBtn">
          <span>纵向</span>
          <div class="arrow">
            <img src="./assets/arrow.svg" alt="arrow">
          </div>
        </button>
        <div class="dropdown-menu" id="arrangeMenu">
          <div class="dropdown-item" data-value="horizontal">横向</div>
          <div class="dropdown-item" data-value="vertical">纵向</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 行内预编辑 -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">行内预编辑</div>
      <div class="dropdown">
        <button class="dropdown-toggle" id="tsfPreeditStyleBtn">
          <span>原始按键</span>
          <img src="./assets/arrow.svg" alt="▼">
        </button>
        <div class="dropdown-menu" id="tsfPreeditStyleMenu">
          <div class="dropdown-item" data-value="raw">原始按键</div>
          <div class="dropdown-item" data-value="pinyin">拼音分词</div>
          <div class="dropdown-item" data-value="empty">不显示</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 候选窗预编辑 -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">候选窗预编辑</div>
      <div class="dropdown">
        <button class="dropdown-toggle" id="candPreeditStyleBtn">
          <span>拼音分词</span>
          <div class="arrow">
            <img src="./assets/arrow.svg" alt="arrow">
          </div>
        </button>
        <div class="dropdown-menu" id="candPreeditStyleMenu">
          <div class="dropdown-item" data-value="pinyin">拼音分词</div>
          <div class="dropdown-item" data-value="empty">不显示</div>
        </div>
      </div>
    </div>
  </div>

</div>
