<div class="content" id="input-settings">
  <div class="content-header"><span>输入</span></div>

  <!-- 输入方案 -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">输入方案</div>
    </div>
    <div class="input-option-content">
      <label class="radio-option">
        <input type="radio" name="input-method" value="quanpin" checked>
        <span>全拼</span>
      </label>

      <div class="input-option-divider"></div>

      <label class="radio-option">
        <input type="radio" name="input-method" value="shuangpin">
        <span>双拼</span>
      </label>

      <div class="input-option-divider"></div>

      <label class="radio-option">
        <input type="radio" name="input-method" value="wubi">
        <span>五笔</span>
      </label>
    </div>
  </div>

  <!-- 双拼方案 -->
  <div class="section shuangpin-option-content">
    <div class="section-header">
      <div class="section-title">双拼方案</div>
      <div class="dropdown">
        <button class="dropdown-toggle dropdown-toggle-shuangpin-scheme" id="shuangpinSchemeBtn">
          <span>小鹤双拼</span>
          <img class="shuangpin-scheme-arrow" src="./assets/arrow.svg" alt="▼">
        </button>
        <div class="dropdown-menu shuangpin-scheme-dropdown-menu" id="shuangpinSchemeMenu">
          <div class="dropdown-item" data-value="xiaohe">小鹤双拼</div>
          <div class="dropdown-item" data-value="ziranma">自然码双拼</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 五笔方案 -->
  <div class="section wubi-option-content">
    <div class="section-header">
      <div class="section-title">五笔方案</div>
      <div class="dropdown">
        <button class="dropdown-toggle dropdown-toggle-wubi-scheme" id="wubiSchemeBtn">
          <span>86 五笔</span>
          <img class="wubi-scheme-arrow" src="./assets/arrow.svg" alt="▼">
        </button>
        <div class="dropdown-menu wubi-scheme-dropdown-menu" id="wubiSchemeMenu">
          <div class="dropdown-item" data-value="wubi86">86 五笔</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section section-page-option">
    <div class="section-header">
      <div class="section-title">翻页方式</div>
    </div>
    <div class="content-page-option">
      <label class="check-option"><input type="checkbox" name="page-method" id="pagingMinusEqualCheckbox" value="minus"><span>- / =</span></label>
      <div class="input-option-divider"></div>
      <label class="check-option"><input type="checkbox" name="page-method" id="pagingCommaPeriodCheckbox" value="comma"><span>, / .</span></label>
      <div class="input-option-divider"></div>
      <label class="check-option"><input type="checkbox" name="page-method" id="pagingTabCheckbox" value="tab"><span>Shift+Tab / Tab</span></label>
      <div class="input-option-divider"></div>
      <label class="check-option"><input type="checkbox" name="page-method" id="pagingPageUpDownCheckbox" value="page"><span>PageUp / PageDown</span></label>
      <div class="input-option-divider"></div>
      <label class="check-option"><input type="checkbox" name="page-method" id="candidateArrowNavigationCheckbox" value="arrow"><span>上 / 下（移动候选项）</span></label>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">中英混输</div>
      <div class="ftb-toggle-btn active" id="zhEnToggleBtn" role="switch" aria-checked="true" tabindex="0">
        <div class="ftb-toggle-knob"></div>
      </div>
    </div>
  </div>

  <!-- 简繁输入 -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">简繁输入</div>
      <div class="dropdown">
        <button class="dropdown-toggle" id="characterSetBtn">
          <span>简体</span>
          <img src="./assets/arrow.svg" alt="▼">
        </button>
        <div class="dropdown-menu" id="characterSetMenu">
          <div class="dropdown-item" data-value="simplified">简体</div>
          <div class="dropdown-item" data-value="traditional">繁体</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">云候选</div>
      <div class="ftb-toggle-btn active" id="cloudCandidatesToggleBtn" role="switch" aria-checked="true" tabindex="0">
        <div class="ftb-toggle-knob"></div>
      </div>
    </div>
  </div>
</div>
