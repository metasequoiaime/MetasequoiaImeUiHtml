<div class="content" id="voice-settings">
  <div class="content-header"><span>语音输入</span></div>

  <div class="section voice-section">
    <div class="section-header"><div><div class="section-title">启用语音输入</div><div class="voice-description">在右键菜单中点击“语音输入”开始或停止录音</div></div><div class="ftb-toggle-btn active" id="voiceEnabled" role="switch" aria-checked="true" tabindex="0"><div class="ftb-toggle-knob"></div></div></div>
  </div>

  <div class="section voice-section">
    <div class="section-title voice-heading">ASR API</div>
    <div class="voice-grid">
      <label><span>服务提供商</span><input id="voiceAsrProvider" type="text" autocomplete="off"></label>
      <label><span>API Token</span><input id="voiceAsrToken" type="password" autocomplete="off"></label>
      <label class="voice-wide"><span>接口地址</span><input id="voiceAsrEndpoint" type="url" autocomplete="off"></label>
    </div>
  </div>

  <div class="section voice-section">
    <div class="section-header voice-heading"><div class="section-title">文本润色 API</div><div class="ftb-toggle-btn" id="voicePolishText" role="switch" aria-checked="false" tabindex="0"><div class="ftb-toggle-knob"></div></div></div>
    <div class="voice-grid">
      <label><span>服务提供商</span><input id="voicePolishProvider" type="text" autocomplete="off"></label>
      <label><span>API Token</span><input id="voicePolishToken" type="password" autocomplete="off"></label>
      <label class="voice-wide"><span>接口地址</span><input id="voicePolishEndpoint" type="url" autocomplete="off"></label>
    </div>
  </div>

  <div class="section voice-section">
    <div class="section-title voice-heading">基础设置</div>
    <div class="voice-basic-row"><label for="voiceLanguage">识别语言</label><select id="voiceLanguage"><option value="zh-cn">简体中文</option><option value="en">English</option></select></div>
    <div class="voice-basic-row"><span>开始和停止录音时播放提示音</span><div class="ftb-toggle-btn active" id="voiceNotificationSound" role="switch" aria-checked="true" tabindex="0"><div class="ftb-toggle-knob"></div></div></div>
  </div>
</div>
