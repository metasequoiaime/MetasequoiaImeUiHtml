<div class="content" id="skin-settings">
  <div class="content-header"><span>皮肤</span></div>

  <div class="section skin-theme-card">
    <div class="skin-theme-header">
      <div>
        <div class="section-title" id="skinThemeTitle">Fluent 主题(Dark)</div>
        <div class="skin-theme-description" id="skinThemeStatus">当前默认主题</div>
      </div>
      <div class="skin-theme-actions">
        <div class="ftb-toggle-btn active skin-theme-toggle" role="switch" aria-checked="true" aria-disabled="true">
          <div class="ftb-toggle-knob"></div>
        </div>
        <button type="button" class="skin-preview-switch" id="skinPreviewSwitch" title="切换明暗预览">
          预览浅色
        </button>
      </div>
    </div>

    <div class="skin-preview-list">
      <div class="skin-preview-row skin-preview-horizontal">
        <div class="skin-preview-stage"><div class="candidate wnd-h" id="skinCandidateHorizontal"></div></div>
      </div>

      <div class="skin-preview-row skin-preview-vertical">
        <div class="skin-preview-stage"><div class="candidate wnd-v" id="skinCandidateVertical"></div></div>
      </div>

      <div class="skin-preview-row skin-preview-toolbar">
        <div class="skin-preview-stage"><div class="ftb-preview-host" id="skinToolbarPreview"></div></div>
      </div>
    </div>
  </div>
</div>
